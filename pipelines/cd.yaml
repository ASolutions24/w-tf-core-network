# yaml-language-server: $schema=https://www.schemastore.org/any.json

trigger: none

parameters:
- name: environment
  displayName: "Select Environment"
  type: string
  default: dev
  values:
  - dev
  - tst
  - prod

- name: action
  displayName: "Execution Mode"
  type: string
  default: plan
  values:
  - plan
  - apply

- name: gitTag
  displayName: "Git Tag Version (e.g. v2026.04.23.123)"
  type: string
  default: ""

- name: variableGroup
  displayName: "Variable Group"
  type: string
  default: "vg-dev"

pool:
  vmImage: 'ubuntu-latest'

variables:
- group: ${{ parameters.variableGroup }}

stages:

- stage: Deploy
  jobs:
  - job: Terraform
    steps:

    - checkout: self
      persistCredentials: true

    # 🔥 CHECKOUT SPECIFIC TAG
    - script: |
        if [ -n "${{ parameters.gitTag }}" ]; then
          echo "Checking out tag ${{ parameters.gitTag }}"
          git fetch --tags
          git checkout tags/${{ parameters.gitTag }}
        fi
      displayName: "Checkout Tag"

    - script: |
        curl -fsSL https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip -o terraform.zip
        unzip terraform.zip
        sudo mv terraform /usr/local/bin/
        terraform version
      displayName: Install Terraform

    #######################################################################################################################
    # Add this block if interested in forcasting resource deployment cost prior to deploy. This may require registering and
    # connecting repo env with service principal with https://dashboard.infracost.io/ and use API Key. 
    #
    #    - script: |
    #        curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
    #        infracost breakdown --path envs/${{ parameters.environment }} \
    #          --format table \
    #          --out-file infracost.txt
    #      displayName: "Run Infracost"
    #      env:
    #        INFRACOST_API_KEY: $(INFRACOST_API_KEY)
    #        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
    #        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
    #        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
    #        ARM_TENANT_ID: $(ARM_TENANT_ID)
    ########################################################################################################################

    - script: |
        cd envs/${{ parameters.environment }}
        terraform init -reconfigure
      displayName: "Terraform Init"
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - script: |
        cd envs/${{ parameters.environment }}
        terraform plan -detailed-exitcode
        EXIT_CODE=$?

        if [ $EXIT_CODE -eq 2 ]; then
          echo "Drift detected!"
          exit 1
        fi
      displayName: "Detect Drift"
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    - script: |
        cd envs/${{ parameters.environment }}
        terraform plan -out=tfplan
      displayName: "Terraform Plan"
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

    # 🔥 CONDITIONAL APPLY
    - script: |
        cd envs/${{ parameters.environment }}
        terraform apply -auto-approve tfplan
      displayName: "Terraform Apply"
      condition: eq('${{ parameters.action }}', 'apply')
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)
