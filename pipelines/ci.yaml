# yaml-language-server: $schema=https://www.schemastore.org/any.json

trigger:
  branches:
    include:
    - main

#Comment to trigger tagging

pool:
  vmImage: 'ubuntu-latest'

variables:
  terraformVersion: '1.6.6'

stages:
- stage: CI
  jobs:
  - job: Validate_And_Tag
    steps:

    - checkout: self
      persistCredentials: true

    - script: |
        curl -fsSL https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip -o terraform.zip
        unzip terraform.zip
        sudo mv terraform /usr/local/bin/
        terraform version
      displayName: Install Terraform
    - script: |
        terraform -version
      displayName: "Terraform Version"

    - script: |
        terraform init -backend=false
        terraform validate
      displayName: "Terraform Validate"

    # 🔥 AUTO VERSION TAGGING
    - script: |
        VERSION="v$(date +%Y.%m.%d).$(Build.BuildId)"
        echo "Tagging version: $VERSION"

        git config user.email "build@devops.com"
        git config user.name "Azure DevOps"

        git tag $VERSION
        git push origin $VERSION
      displayName: "Create Git Tag"
