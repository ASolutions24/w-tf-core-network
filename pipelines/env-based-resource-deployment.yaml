# yaml-language-server: $schema=https://www.schemastore.org/any.json

name: cd-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none

parameters:
- name: environment
  displayName: "Select Environment"
  type: string
  default: dev
  values:
  - dev
  - tst
  - prod

- name: action
  displayName: "Execution Mode"
  type: string
  default: plan
  values:
  - plan
  - apply

- name: gitTag
  displayName: "Git Tag Version (e.g. v2026.04.23.123)"
  type: string
  default: ""

variables:
- group: vg-${{ parameters.environment }}

pool:
  vmImage: 'ubuntu-latest'

stages:

- stage: Deploy
  displayName: "Deploy to ${{ parameters.environment }}"
  jobs:
  - template: templates/template-tf-job-v2.yml
    parameters:
      jobName: Terraform_${{ parameters.environment }}
      workingDir: envs/${{ parameters.environment }}
      #displayPrefix: '${{ parameters.environment | upper }} Deployment'
      displayPrefix: '${{ parameters.environment }} Deployment'
      terraformVersion: '1.6.6'

      # 🔥 convert action → plan_only
      plan_only: ${{ eq(parameters.action, 'plan') }}

      # 🔥 pass git tag
      gitTag: ${{ parameters.gitTag }}
