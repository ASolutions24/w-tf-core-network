    - script: terraform plan -out=tfplan
      workingDirectory: $(workingDir)
      displayName: "Firewall Rules Terraform Plan"
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
